services:
  convert-pii:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: privacy-filter-pii-convert
    working_dir: /workspace
    volumes:
      - ./src:/workspace:ro
      - ./data:/workspace/data
      - ../finetune-qwen/processed:/sources/kdpii:ro
      - ../finetune-gliner2/data:/sources/rrn:ro
    command: python3 convert_korean_pii_to_opf.py
      --kdpii /sources/kdpii/KDPII.jsonl
      --rrn /sources/rrn/korean_rrn_synthetic.jsonl
      --output-dir ${PF_CONVERT_OUTPUT_DIR:-/workspace/data/generated/ko_pii_opf_v4}
  # BLOCKED: ONNX export of openai_privacy_filter is not currently working with
  # the public toolchain. See header of src/export_and_benchmark.py for details.
  # This service is kept as scaffolding to resume from once exportable.
  export-pii:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: privacy-filter-pii-export
    runtime: nvidia
    working_dir: /workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=${PF_EXPORT_GPU:-0}
      - HF_HOME=/home/appuser/.cache/huggingface
      - PYTHONPATH=/privacy-filter
      - PF_EXPORT_INPUT=${PF_EXPORT_INPUT:-/workspace/data/checkpoints/ko_pii_hf_ddp_v6_lora}
      - PF_EXPORT_OUTPUT=${PF_EXPORT_OUTPUT:-/workspace/data/exports}
      - PF_EXPORT_DATASET=${PF_EXPORT_DATASET:-/workspace/data/generated/ko_pii_opf_v4/test.jsonl}
      - PF_EXPORT_LABEL_SPACE=${PF_EXPORT_LABEL_SPACE:-/workspace/data/generated/ko_pii_opf_v4/label_space.json}
      - PF_EXPORT_MAX_F1_DROP=${PF_EXPORT_MAX_F1_DROP:-0.02}
      - PF_EXPORT_MAX_LENGTH=${PF_EXPORT_MAX_LENGTH:-512}
      - PF_EXPORT_VARIANTS=${PF_EXPORT_VARIANTS:-fp16,int8}
    volumes:
      - ~/llm_models/huggingface_cache:/home/appuser/.cache/huggingface
      - ./src:/workspace:ro
      - ./data:/workspace/data
      - ../../privacy-filter:/privacy-filter:ro
    command: python3 /workspace/export_and_benchmark.py
  benchmark-pii:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: privacy-filter-pii-benchmark
    runtime: nvidia
    working_dir: /workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=${PF_BENCH_GPU:-0}
      - HF_HOME=/home/appuser/.cache/huggingface
    volumes:
      - ~/llm_models/huggingface_cache:/home/appuser/.cache/huggingface
      - ./src:/workspace:ro
      - ./data:/data
      - ${DATASET_DIR:-../datasets/korean}/processed_split:/data/processed:ro
      - ~/llm_models:/models:ro
    command: python benchmark_pii_heldout.py
      --model ${PF_MODEL:-/models/privacy-filter}
      --dataset ${PF_BENCH_DATASET:-/data/generated/ko_pii_opf_v2/test.jsonl}
      --label-space-json ${PF_LABEL_SPACE_JSON:-/data/generated/ko_pii_opf_v2/label_space.json}
      --samples ${BENCH_SAMPLES:-0}
      --output ${BENCH_OUTPUT:-/data/benchmark_results/privacy_filter_span_benchmark.json}
  train-pii:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: privacy-filter-pii-train
    runtime: nvidia
    working_dir: /workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=${PF_TRAIN_GPUS:-0,1}
      - HF_HOME=/home/appuser/.cache/huggingface
      - PYTHONPATH=/privacy-filter
    volumes:
      - ~/llm_models/huggingface_cache:/home/appuser/.cache/huggingface
      - ./src:/workspace:rw
      - ./data:/workspace/data
      - ../../privacy-filter:/privacy-filter:ro
      - ~/llm_models:/models:ro
    command: bash
